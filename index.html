<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EJBEH CADASTRE MAP</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    /* ========= TOP SEARCH BAR (small, like your screenshot) ========= */
    .topbar {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 9999;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
    }
    .topbar input {
      flex: 1 1 auto;
      min-width: 120px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.18);
      padding: 0 12px;
      outline: none;
      font-size: 14px;
    }
    .topbar button {
      height: 36px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.18);
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    .topbar button:hover { background: #f3f5f7; }

    .hint {
      position: fixed;
      top: 58px;
      left: 12px;
      z-index: 9999;
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: rgba(0,0,0,0.65);
      background: rgba(255,255,255,0.75);
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      display: none; /* shown after data loads */
    }

    /* ========= SMALL TITLE BADGE (top-left) ========= */
    .badge {
      position: fixed;
      top: 74px;
      left: 10px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      padding: 10px 12px;
      font-family: Arial, sans-serif;
      max-width: 320px;
    }
    .badge .t { font-weight: 800; font-size: 16px; margin: 0 0 3px 0; }
    .badge .s { font-size: 12px; opacity: 0.75; margin: 0; }

    /* ========= BRAND CARD (bottom-left) ========= */
    .brandCard {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      padding: 12px 12px;
      font-family: Arial, sans-serif;
      display: flex;
      gap: 12px;
      align-items: center;
      max-width: min(520px, calc(100vw - 20px));
    }
    .brandLogo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .brandLogo img { width: 100%; height: 100%; object-fit: contain; padding: 6px; display:block; }
    .brandText { min-width: 0; }
    .brandName { font-weight: 800; font-size: 14px; margin: 0; line-height: 1.1; }
    .brandRole { font-size: 11px; opacity: 0.75; margin: 2px 0 0 0; }
    .brandLinks { margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.14);
      background: #fff;
      font-size: 12px;
      text-decoration: none;
      color: #111;
      cursor: pointer;
      user-select: none;
    }
    .pill:hover { background: #f3f5f7; }
    .pill.primary { border-color: rgba(11,95,255,0.35); color: #0b5fff; }

    /* ========= POPUP FIX (NO vertical letters) ========= */
    .leaflet-popup-content-wrapper { border-radius: 14px; }
    .leaflet-popup-content {
      margin: 12px 12px;
      width: 360px !important;
      max-width: 360px !important;
      min-width: 320px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      line-height: 1.25;
    }
    .popup-title { font-weight: 800; margin: 0 0 8px 0; font-size: 14px; }
    .kv { display: grid; grid-template-columns: 120px 1fr; gap: 7px 10px; }
    .k { opacity: 0.70; }
    .v {
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;   /* IMPORTANT: do NOT use "anywhere" */
    }
    .v.rtl { direction: rtl; text-align: right; }

    /* ========= RESPONSIVE ========= */
    @media (max-width: 520px) {
      .topbar { gap: 8px; padding: 8px; }
      .topbar input { height: 34px; font-size: 13px; }
      .topbar button { height: 34px; font-size: 13px; padding: 0 12px; }
      .badge { top: 66px; max-width: calc(100vw - 20px); }
      .leaflet-popup-content {
        width: 300px !important;
        max-width: 300px !important;
        min-width: 280px;
      }
      .brandCard { gap: 10px; padding: 10px; }
      .brandLogo { width: 50px; height: 50px; }
      .kv { grid-template-columns: 105px 1fr; }
    }
  </style>
</head>

<body>
  <!-- TOP SEARCH BAR -->
  <div class="topbar">
    <input id="q"
           list="suggestions"
           placeholder="Search by Parcel Number or Owner"
           autocomplete="off" />
    <datalist id="suggestions"></datalist>
    <button id="btnSearch">Search</button>
    <button id="btnClear">Clear</button>
  </div>

  <div class="hint" id="hint">Tip: start typing a parcel number or an owner name and choose from the dropdown.</div>

  <!-- Title badge -->
  <div class="badge">
    <p class="t">EJBEH CADASTRE MAP</p>
    <p class="s">Parcels: EJBEH_PARCELS • Skygridlb</p>
  </div>

  <div id="map"></div>

  <!-- Branding card bottom-left -->
  <div class="brandCard">
    <div class="brandLogo" title="Skygridlb">
      <!-- Logo file MUST be at repo root: skygridlb.png -->
      <img src="skygridlb.png" alt="Skygridlb" />
    </div>
    <div class="brandText">
      <p class="brandName">FADI BOULOS KASS HANNA</p>
      <p class="brandRole">OWNER | GENERAL MANAGER<br/>GEO SPATIAL ENGINEER</p>

      <div class="brandLinks">
        <a class="pill primary" href="tel:+96171709417">+961 71 709 417</a>
        <a class="pill primary" href="mailto:fadi@skygridlb.com">fadi@skygridlb.com</a>

        <a class="pill" href="https://www.facebook.com/skygridlb" target="_blank" rel="noopener">Facebook</a>
        <a class="pill" href="https://www.instagram.com/skygridlb" target="_blank" rel="noopener">Instagram</a>
        <a class="pill" href="https://www.linkedin.com/company/skygridlb" target="_blank" rel="noopener">LinkedIn</a>

        <span style="font-size:12px;opacity:.7;">© <span id="y"></span></span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    const startLat = 34.308659;
    const startLng = 35.941757;
    const startZoom = 18;

    const map = L.map('map', {
      zoomControl: true,
      preferCanvas: true,
      maxZoom: 23
    }).setView([startLat, startLng], startZoom);

    // Satellite
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 23, attribution: 'Imagery © Esri' }
    ).addTo(map);

    // Labels
    L.tileLayer(
      'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 23, attribution: 'Labels © Esri' }
    ).addTo(map);

    function parcelStyle() {
      return {
        color: '#ff2d2d',
        weight: 2,
        fillColor: '#ff2d2d',
        fillOpacity: 0.08
      };
    }
    function highlightStyle() {
      return { weight: 3, fillOpacity: 0.14 };
    }

    function getAny(props, keys) {
      for (const k of keys) {
        if (!props) continue;
        const v = props[k];
        if (v !== undefined && v !== null && String(v).trim() !== "") return v;
      }
      return null;
    }
    function norm(s) { return String(s ?? "").trim(); }

    // ✅ GeoJSON is in /data
    const parcelsUrl = "data/EJBEH_PARCELS.geojson";

    let parcelsLayer = null;
    const parcelIndex = new Map(); // parcelNum -> layer
    const ownerIndex  = new Map(); // owner -> layers
    let suggestions = [];

    function buildPopupHtml(feature) {
      const p = feature.properties || {};

      const parcelNum = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","ParcNum","PARCELNO"]);
      const owner     = getAny(p, ["Owner","OWNER","Owners_All","OWNERS_ALL"]);
      const prepared  = getAny(p, ["PreparedBy","PreparedBY","CreatedBY","CreatedBy","CREATEDBY"]);
      const mahalla   = getAny(p, ["AL_MAHALLA","Mahalla","MAHALLA"]);
      const areaRaw   = getAny(p, ["Area","AREA","Shape_Area","SHAPE_AREA"]);

      // area formatting + m²
      let areaText = null;
      if (areaRaw !== null && areaRaw !== undefined && String(areaRaw).trim() !== "") {
        const num = Number(String(areaRaw).replace(/,/g,"").trim());
        areaText = Number.isFinite(num) ? (num.toLocaleString() + " m\u00B2") : (String(areaRaw) + " m\u00B2");
      }

      return `
        <div class="popup-title">Parcel${parcelNum ? " #" + parcelNum : ""}</div>
        <div class="kv">
          ${owner ? `<div class="k">Owner</div><div class="v rtl">${owner}</div>` : ""}
          ${prepared ? `<div class="k">Prepared By</div><div class="v">${prepared}</div>` : ""}
          ${mahalla ? `<div class="k">Al Mahalla</div><div class="v rtl">${mahalla}</div>` : ""}
          ${areaText ? `<div class="k">Area (m²)</div><div class="v">${areaText}</div>` : ""}
        </div>
      `;
    }

    function addSuggestion(value) {
      const v = norm(value);
      if (!v) return;
      suggestions.push(v);
    }

    function refreshDatalist() {
      const uniq = Array.from(new Set(suggestions));
      uniq.sort((a,b) => a.localeCompare(b));
      const dl = document.getElementById("suggestions");
      dl.innerHTML = uniq.map(v => `<option value="${v.replace(/"/g, "&quot;")}"></option>`).join("");
    }

    function zoomToLayer(layer) {
      if (!layer) return;
      const b = layer.getBounds ? layer.getBounds() : null;
      if (b && b.isValid && b.isValid()) {
        map.fitBounds(b, { padding: [30, 30], maxZoom: 22 });
      }
      layer.openPopup();
    }

    function search(q) {
      q = norm(q);
      if (!q || !parcelsLayer) return;

      // If numeric => parcel number
      const isNum = /^[0-9]+(\.[0-9]+)?$/.test(q);

      if (isNum) {
        const layer = parcelIndex.get(q);
        if (layer) return zoomToLayer(layer);
        alert("Parcel not found: " + q);
        return;
      }

      // Owner search exact then contains
      let layers = ownerIndex.get(q) || [];
      if (!layers.length) {
        for (const [owner, arr] of ownerIndex.entries()) {
          if (owner.includes(q)) { layers = arr; break; }
        }
      }

      if (!layers.length) {
        alert("Owner not found: " + q);
        return;
      }

      // If owner has many parcels, zoom to first match
      zoomToLayer(layers[0]);
    }

    fetch(parcelsUrl)
      .then(r => {
        if (!r.ok) throw new Error("Could not load " + parcelsUrl);
        return r.json();
      })
      .then(geojson => {
        parcelsLayer = L.geoJSON(geojson, {
          style: parcelStyle,
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};

            layer.bindPopup(buildPopupHtml(feature), { maxWidth: 380 });

            layer.on('mouseover', () => layer.setStyle(highlightStyle()));
            layer.on('mouseout', () => layer.setStyle(parcelStyle()));

            const parcelNum = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","ParcNum","PARCELNO"]);
            const owner     = getAny(p, ["Owner","OWNER","Owners_All","OWNERS_ALL"]);

            if (parcelNum !== null) {
              const pn = norm(parcelNum);
              if (pn) {
                parcelIndex.set(pn, layer);
                addSuggestion(pn);
              }
            }

            if (owner !== null) {
              const o = norm(owner);
              if (o) {
                if (!ownerIndex.has(o)) ownerIndex.set(o, []);
                ownerIndex.get(o).push(layer);
                addSuggestion(o);
              }
            }
          }
        }).addTo(map);

        try { map.fitBounds(parcelsLayer.getBounds(), { padding: [20, 20] }); } catch(e) {}

        refreshDatalist();
        document.getElementById("hint").style.display = "inline-block";
      })
      .catch(err => {
        console.error(err);
        alert(
          "GeoJSON not found.\n\n" +
          "Make sure the file exists at:\n" +
          "data/EJBEH_PARCELS.geojson\n\n" +
          "Error: " + err.message
        );
      });

    document.getElementById("btnSearch").addEventListener("click", () => {
      search(document.getElementById("q").value);
    });

    document.getElementById("q").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        search(e.target.value);
      }
    });

    document.getElementById("btnClear").addEventListener("click", () => {
      document.getElementById("q").value = "";
      map.setView([startLat, startLng], startZoom);
    });
  </script>
</body>
</html>
