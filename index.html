<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EJBEH CADASTRE MAP</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Awesomplete (autocomplete) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    /* ===== TOP SEARCH CARD (clean, no tip) ===== */
    .card {
      position: absolute;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
    }

    #topCard{
      top: 14px;
      left: 14px;
      padding: 12px 12px 10px 12px;
      width: 330px;
      max-width: calc(100vw - 28px);
    }

    #topCard h1{
      margin: 0 0 4px 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .2px;
    }
    #topCard .sub{
      margin: 0 0 10px 0;
      font-size: 12px;
      opacity: .75;
    }

    .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .inputs{ display:grid; grid-template-columns: 1fr; gap:10px; margin-top:10px; }
    label{ display:block; font-size:11px; opacity:.75; margin:0 0 4px 0; }

    .inp{
      width:100%;
      box-sizing:border-box;
      border:1px solid rgba(0,0,0,0.18);
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      outline:none;
      background: rgba(255,255,255,0.96);
    }

    .btn{
      cursor:pointer;
      border:1px solid rgba(0,0,0,0.14);
      background:#fff;
      border-radius:12px;
      padding:7px 10px;
      font-size:12px;
      user-select:none;
      display:inline-flex;
      gap:6px;
      align-items:center;
    }
    .btn:hover{ background:#f2f4f6; }

    .miniBtn{
      padding:6px 9px;
      font-size:12px;
      border-radius:12px;
    }

    /* ===== Compact mode when zoomed in (your request) ===== */
    #topCard.compact{
      width: 250px;
      padding: 10px;
    }
    #topCard.compact h1{ font-size: 14px; margin-bottom: 2px; }
    #topCard.compact .sub{ display:none; }
    #topCard.compact .inp{ padding:8px 10px; font-size:12px; }
    #topCard.compact .btn{ padding:6px 9px; font-size:11px; }

    /* hide inputs (toggle) */
    #topCard.hidden .inputs { display:none; }
    #topCard.hidden .sub { display:none; }

    /* ===== Bottom-left branding like cemetery ===== */
    #brandCard{
      left: 14px;
      bottom: 14px;
      padding: 12px 14px;
      max-width: 360px;
      width: 360px;
      max-width: calc(100vw - 28px);
    }
    #brandCard .powered{
      font-size: 11px;
      opacity: .70;
      margin: 0 0 8px 0;
    }
    #brandCard .brandRow{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom: 10px;
    }
    #brandCard .logoBox{
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex: 0 0 auto;
    }
    #brandCard .logoBox img{
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
      display:block;
    }
    #brandCard .name{
      margin: 0;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: .2px;
      line-height: 1.2;
    }
    #brandCard .role{
      margin: 2px 0 0 0;
      font-size: 11px;
      font-weight: 800;
      opacity: .80;
      letter-spacing: .25px;
    }
    #brandCard .contact{
      margin: 8px 0 0 0;
      font-size: 12px;
      line-height: 1.5;
    }
    #brandCard .socials{
      margin-top: 10px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    #brandCard .socials a{
      text-decoration:none;
      color:#0b5fff;
      font-weight:700;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.9);
    }
    #brandCard .socials a:hover{ background:#f2f4f6; }

    #brandCard .tagline{
      margin: 10px 0 0 0;
      font-size: 11px;
      opacity: .70;
      letter-spacing: .6px;
    }

    /* ===== Popup ===== */
    .popup-title{ font-weight: 900; margin-bottom: 6px; }
    .kv{ display:grid; grid-template-columns: 95px 1fr; gap: 6px 10px; }
    .k{ opacity:.75; font-weight:700; }
    .v{ word-break: break-word; }

    /* Optional: make Awesomplete dropdown look nicer over map */
    .awesomplete > ul { border-radius: 12px; overflow: hidden; }
  </style>
</head>

<body>
  <!-- TOP SEARCH -->
  <div class="card" id="topCard">
    <div class="row" style="justify-content:space-between;">
      <div>
        <h1>EJBEH CADASTRE MAP</h1>
        <div class="sub">Parcels: EJBEH_PARCELS • Skygridlb</div>
      </div>
      <button class="btn miniBtn" id="btnToggle" title="Hide/Show">Hide</button>
    </div>

    <div class="row">
      <button class="btn" id="btnSearch">Search</button>
      <button class="btn" id="btnClear">Clear</button>
      <button class="btn" id="btnHome">Home</button>
    </div>

    <div class="inputs">
      <div>
        <label for="qParcel">Search by Parcel Number</label>
        <input id="qParcel" class="inp" placeholder="e.g. 530" autocomplete="off" />
      </div>

      <div>
        <label for="qOwner">Search by Owner (Arabic) — autocomplete</label>
        <input id="qOwner" class="inp" placeholder="اكتب اسم المالك..." autocomplete="off" />
      </div>
    </div>
  </div>

  <div id="map"></div>

  <!-- BOTTOM-LEFT BRANDING (cemetery style) -->
  <div class="card" id="brandCard">
    <div class="powered">Powered by</div>

    <div class="brandRow">
      <div class="logoBox">
        <!-- Put logo here: /assets/skygridlb.png -->
        <img src="assets/skygridlb.png" alt="Skygridlb" onerror="this.style.display='none';" />
      </div>

      <div>
        <p class="name">FADI BOULOS KASS HANNA</p>
        <p class="role">OWNER | GENERAL MANAGER</p>
        <p class="role">GEO SPATIAL ENGINEER</p>
      </div>
    </div>

    <div class="contact">
      <div>+961 71 709 417</div>
      <div>fadi@skygridlb.com</div>
    </div>

    <div class="socials">
      <a href="https://www.facebook.com/skygridlb" target="_blank" rel="noopener">Facebook</a>
      <a href="https://www.instagram.com/skygridlb/" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.linkedin.com/company/skygridlb" target="_blank" rel="noopener">LinkedIn</a>
    </div>

    <div class="tagline">YOUR SPACE • OUR DATA</div>
  </div>

  <script>
    // Start location
    const startLat = 34.308659;
    const startLng = 35.941757;
    const startZoom = 18;

    // Map
    const map = L.map('map', { zoomControl: true, preferCanvas: true, maxZoom: 22 })
      .setView([startLat, startLng], startZoom);

    // Satellite (Esri)
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 22, attribution: 'Imagery © Esri' }
    ).addTo(map);

    // optional labels overlay (keeps place names readable)
    L.tileLayer(
      'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 22, attribution: 'Labels © Esri' }
    ).addTo(map);

    // Parcels style: red outline only
    function parcelStyle() {
      return { color: '#ff2d2d', weight: 1.5, fillOpacity: 0 };
    }

    function getAny(props, keys) {
      for (const k of keys) {
        if (props && props[k] !== undefined && props[k] !== null) {
          const s = String(props[k]).trim();
          if (s !== "" && s.toLowerCase() !== "none" && s.toLowerCase() !== "null") return props[k];
        }
      }
      return null;
    }

    const parcelsUrl = "data/EJBEH_PARCELS.geojson";
    let parcelsLayer = null;

    let parcelNums = [];
    let owners = [];

    function uniqueSorted(arr, locale) {
      const s = new Set(arr.map(v => String(v).trim()).filter(v => v !== ""));
      return Array.from(s).sort((a,b) => a.localeCompare(b, locale));
    }

    function zoomToLayer(layer) {
      try {
        map.fitBounds(layer.getBounds(), { padding: [30, 30] });
        layer.openPopup();
      } catch(e) {}
    }

    fetch(parcelsUrl)
      .then(r => { if (!r.ok) throw new Error("Could not load " + parcelsUrl); return r.json(); })
      .then(geojson => {

        parcelsLayer = L.geoJSON(geojson, {
          style: parcelStyle,
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};

            // Popup fields ONLY: Owner, CreatedBY, Area, AL_MAHALLA
            const owner = getAny(p, ["Owner","OWNER","Owners","OWNERS","Owners_All","OWNERS_ALL"]);
            const createdBy = getAny(p, ["CreatedBY","CREATEDBY","CreatedBy","CREATED_BY","PreparedBy","PREPAREDBY"]);
            const area = getAny(p, ["Area","AREA","Shape_Area","SHAPE_AREA"]);
            const mahalla = getAny(p, ["AL_MAHALLA","Mahalla","MAHALLA"]);

            // Parcel number for searching
            const parcNum = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","PARCELNO","ParcelNo"]);

            if (parcNum !== null) parcelNums.push(parcNum);
            if (owner !== null) owners.push(owner);

            const html = `
              <div class="popup-title">Parcel${parcNum ? " #" + parcNum : ""}</div>
              <div class="kv">
                ${owner ? `<div class="k">Owner</div><div class="v">${owner}</div>` : ""}
                ${createdBy ? `<div class="k">PreparedBy</div><div class="v">${createdBy}</div>` : ""}
                ${mahalla ? `<div class="k">Al Mahalla</div><div class="v">${mahalla}</div>` : ""}
                ${area ? `<div class="k">Area</div><div class="v">${area}</div>` : ""}
              </div>
            `;
            layer.bindPopup(html, { maxWidth: 520 });

            // Hover highlight
            layer.on('mouseover', () => layer.setStyle({ weight: 2.5 }));
            layer.on('mouseout', () => layer.setStyle(parcelStyle()));
          }
        }).addTo(map);

        // Zoom to all parcels
        try { map.fitBounds(parcelsLayer.getBounds(), { padding: [20, 20] }); } catch(e) {}

        // Autocomplete
        parcelNums = uniqueSorted(parcelNums, "en");
        owners = uniqueSorted(owners, "ar");

        new Awesomplete(document.getElementById("qParcel"), {
          list: parcelNums,
          minChars: 1,
          maxItems: 12,
          autoFirst: true
        });

        new Awesomplete(document.getElementById("qOwner"), {
          list: owners,
          minChars: 1,
          maxItems: 12,
          autoFirst: true,
          filter: function(text, input) {
            // Arabic-friendly contains
            return text.indexOf(input) !== -1;
          }
        });
      })
      .catch(err => {
        console.error(err);
        alert(
          "GeoJSON not found.\n\n" +
          "Make sure you uploaded:\n" +
          "data/EJBEH_PARCELS.geojson\n\n" +
          "Error: " + err.message
        );
      });

    function searchParcel() {
      const q = (document.getElementById("qParcel").value || "").trim();
      if (!q || !parcelsLayer) return;

      let found = null;
      parcelsLayer.eachLayer(l => {
        const p = l.feature && l.feature.properties ? l.feature.properties : {};
        const pn = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","PARCELNO","ParcelNo"]);
        if (pn !== null && String(pn).trim() === q) found = l;
      });

      if (found) zoomToLayer(found);
      else alert("Parcel not found: " + q);
    }

    function searchOwner() {
      const q = (document.getElementById("qOwner").value || "").trim();
      if (!q || !parcelsLayer) return;

      const matches = [];
      parcelsLayer.eachLayer(l => {
        const p = l.feature && l.feature.properties ? l.feature.properties : {};
        const ow = getAny(p, ["Owner","OWNER","Owners","OWNERS","Owners_All","OWNERS_ALL"]);
        if (ow !== null) {
          const s = String(ow).trim();
          if (s === q || s.indexOf(q) !== -1) matches.push(l);
        }
      });

      if (matches.length === 0) { alert("Owner not found: " + q); return; }

      // Zoom to first match
      zoomToLayer(matches[0]);
    }

    // Buttons
    document.getElementById("btnSearch").addEventListener("click", () => {
      const qP = (document.getElementById("qParcel").value || "").trim();
      const qO = (document.getElementById("qOwner").value || "").trim();
      if (qP) searchParcel();
      else if (qO) searchOwner();
      else alert("Type Parcel Number or Owner name.");
    });

    document.getElementById("btnClear").addEventListener("click", () => {
      document.getElementById("qParcel").value = "";
      document.getElementById("qOwner").value = "";
    });

    document.getElementById("btnHome").addEventListener("click", () => {
      map.setView([startLat, startLng], startZoom);
    });

    // Enter triggers
    document.getElementById("qParcel").addEventListener("keydown", (e) => { if (e.key === "Enter") searchParcel(); });
    document.getElementById("qOwner").addEventListener("keydown", (e) => { if (e.key === "Enter") searchOwner(); });

    // Autocomplete selection triggers zoom
    document.getElementById("qParcel").addEventListener("awesomplete-selectcomplete", () => searchParcel());
    document.getElementById("qOwner").addEventListener("awesomplete-selectcomplete", () => searchOwner());

    // Compact on zoom (so the box doesn't cover imagery)
    const topCard = document.getElementById("topCard");
    map.on("zoomend", () => {
      const z = map.getZoom();
      // compact when zoomed in
      if (z >= 19) topCard.classList.add("compact");
      else topCard.classList.remove("compact");
    });

    // Hide/Show panel
    const btnToggle = document.getElementById("btnToggle");
    btnToggle.addEventListener("click", () => {
      const hidden = topCard.classList.toggle("hidden");
      btnToggle.textContent = hidden ? "Show" : "Hide";
    });
  </script>
</body>
</html>
