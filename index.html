<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EJBEH CADASTRE MAP</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Awesomplete (autocomplete) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.7/awesomplete.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.7/awesomplete.min.js"></script>

  <!-- Font Awesome for social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    /* Glass branding panels */
    .panel {
      position: absolute;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
    }

    .brand {
      top: 14px;
      left: 14px;
      padding: 10px 12px;
      max-width: 420px;
    }
    .brand .title { font-size: 16px; font-weight: 800; margin: 0 0 4px 0; letter-spacing: 0.2px; }
    .brand .sub { font-size: 12px; opacity: 0.8; margin: 0; }

    .logo {
      top: 14px;
      right: 14px;
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0;
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; padding: 7px; }

    /* Search panel */
    .search {
      top: 92px;
      left: 14px;
      padding: 10px 12px;
      width: 420px;
      max-width: calc(100vw - 28px);
    }
    .search .row { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .search label { font-size: 12px; opacity: 0.75; display: block; margin-bottom: 4px; }
    .search input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 10px 10px;
      font-size: 14px;
      outline: none;
      background: white;
    }
    .search input:focus { border-color: rgba(11,95,255,0.45); box-shadow: 0 0 0 3px rgba(11,95,255,0.12); }
    .hint { font-size: 12px; opacity: 0.65; margin-top: 6px; }

    /* Footer */
    .footer {
      left: 14px;
      bottom: 14px;
      padding: 9px 10px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .footer .name { font-weight: 800; }
    .footer a {
      color: #0b5fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .footer a:hover { text-decoration: underline; }

    .btn {
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.12);
      background: white;
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
    }
    .btn:hover { background: #f3f5f7; }

    /* Popup styling */
    .popup-title { font-weight: 800; margin-bottom: 8px; }
    .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 10px; }
    .k { opacity: 0.7; }
    .v { word-break: break-word; }

    /* Awesomplete dropdown max height */
    .awesomplete > ul { max-height: 240px; overflow: auto; }

    /* Mobile adjustments */
    @media (max-width: 520px){
      .search { width: calc(100vw - 28px); }
      .brand { max-width: calc(100vw - 110px); }
    }
  </style>
</head>

<body>
  <!-- Branding -->
  <div class="panel brand">
    <p class="title">EJBEH CADASTRE MAP</p>
    <p class="sub">Parcels: EJBEH_PARCELS • Skygridlb</p>
  </div>

  <!-- Logo -->
  <div class="panel logo" title="Skygridlb">
    <img src="skygridlb_logo.png" alt="Skygridlb Logo" onerror="this.style.display='none';" />
  </div>

  <!-- Search box -->
  <div class="panel search">
    <div class="row">
      <div>
        <label for="qParcel">Search by Parcel Number</label>
        <input id="qParcel" type="text" placeholder="e.g. 530" autocomplete="off">
      </div>
      <div>
        <label for="qOwner">Search by Owner (Arabic) — autocomplete</label>
        <input id="qOwner" type="text" placeholder="اكتب اسم المالك..." dir="rtl" autocomplete="off">
      </div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <button class="btn" id="btnHome"><i class="fa-solid fa-house"></i> Home</button>
        <button class="btn" id="btnClear"><i class="fa-solid fa-eraser"></i> Clear</button>
      </div>
      <div class="hint">Tip: choose from the dropdown. Parcel search zooms مباشرة للقطعة ويفتح الـ popup.</div>
    </div>
  </div>

  <div id="map"></div>

  <!-- Footer / contact -->
  <div class="panel footer">
    <span class="name">Skygridlb — Eng. Fadi Kasshanna</span>
    <span>© <span id="y"></span></span>

    <!-- Replace links with your real pages if needed -->
    <a href="https://www.linkedin.com/company/skygridlb/" target="_blank" rel="noopener">
      <i class="fa-brands fa-linkedin"></i> LinkedIn
    </a>
    <a href="https://www.instagram.com/" target="_blank" rel="noopener">
      <i class="fa-brands fa-instagram"></i> Instagram
    </a>
    <a href="https://www.facebook.com/" target="_blank" rel="noopener">
      <i class="fa-brands fa-facebook"></i> Facebook
    </a>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    // Start location you gave
    const startLat = 34.308659;
    const startLng = 35.941757;
    const startZoom = 19; // more zoom at start

    // Map
    const map = L.map('map', {
      zoomControl: true,
      preferCanvas: true
    }).setView([startLat, startLng], startZoom);

    // Satellite (Esri World Imagery) — good "Google-like" satellite
    const esriImagery = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 23, attribution: 'Imagery © Esri' } // allow higher zoom
    ).addTo(map);

    // Optional labels
    const esriLabels = L.tileLayer(
      'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 23, attribution: 'Labels © Esri' }
    ).addTo(map);

    L.control.layers(
      { "Satellite": esriImagery },
      { "Labels": esriLabels },
      { collapsed: true }
    ).addTo(map);

    // Parcels styling
    function parcelStyle() {
      return { color: '#ff3b30', weight: 2, fillColor: '#ff3b30', fillOpacity: 0.08 };
    }
    function parcelStyleHover() {
      return { weight: 3, fillOpacity: 0.15 };
    }

    function getAny(props, keys) {
      for (const k of keys) {
        if (props && props[k] !== undefined && props[k] !== null && String(props[k]).trim() !== "") {
          return props[k];
        }
      }
      return null;
    }

    // ===== Load GeoJSON =====
    const parcelsUrl = "data/EJBEH_PARCELS.geojson";

    let parcelsLayer = null;

    // Indexes for quick search
    const byParcel = new Map();   // parcelNum -> layer
    const byOwner  = new Map();   // ownerName -> [layers]

    // Autocomplete instances
    const qParcel = document.getElementById("qParcel");
    const qOwner  = document.getElementById("qOwner");

    let acParcel = new Awesomplete(qParcel, { minChars: 1, maxItems: 20, autoFirst: true });
    let acOwner  = new Awesomplete(qOwner,  { minChars: 1, maxItems: 20, autoFirst: true });

    function zoomToLayer(layer) {
      if (!layer) return;
      try {
        map.fitBounds(layer.getBounds(), { padding: [30, 30], maxZoom: 21 });
      } catch(e) {
        // fallback if bounds not available
      }
      layer.openPopup();
    }

    function popupHtml(props) {
      // ONLY: owner, preparedby, area, al mahalla
      const owner = getAny(props, ["Owner", "OWNER", "Owners_All", "OWNERS_ALL"]);
      const prepared = getAny(props, ["PreparedBy", "PREPAREDBY", "CreatedBY", "CREATEDBY", "CreatedBy", "createdby"]);
      const mahalla = getAny(props, ["AL_MAHALLA", "Mahalla", "MAHALLA"]);
      const area = getAny(props, ["Area", "AREA", "Shape_Area", "SHAPE_AREA"]);

      // Title: if you have parcel number
      const parcelNum = getAny(props, ["Parc_Num", "PARC_NUM", "Parcel_Num", "PARCEL_NUM", "PARCELNO", "ParcelNo"]);

      return `
        <div class="popup-title">Parcel${parcelNum ? " #" + parcelNum : ""}</div>
        <div class="kv">
          ${owner ? `<div class="k">Owner</div><div class="v">${owner}</div>` : ""}
          ${prepared ? `<div class="k">Prepared By</div><div class="v">${prepared}</div>` : ""}
          ${mahalla ? `<div class="k">Al Mahalla</div><div class="v">${mahalla}</div>` : ""}
          ${area ? `<div class="k">Area</div><div class="v">${area}</div>` : ""}
        </div>
      `;
    }

    fetch(parcelsUrl)
      .then(r => {
        if (!r.ok) throw new Error("Could not load " + parcelsUrl + " (HTTP " + r.status + ")");
        return r.json();
      })
      .then(geojson => {
        parcelsLayer = L.geoJSON(geojson, {
          style: parcelStyle,
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};

            // popup
            layer.bindPopup(popupHtml(p), { maxWidth: 460 });

            // hover highlight
            layer.on('mouseover', () => layer.setStyle(parcelStyleHover()));
            layer.on('mouseout', () => layer.setStyle(parcelStyle()));

            // Build search indexes
            const parcelNum = getAny(p, ["Parc_Num", "PARC_NUM", "Parcel_Num", "PARCEL_NUM", "PARCELNO", "ParcelNo"]);
            const owner = getAny(p, ["Owner", "OWNER", "Owners_All", "OWNERS_ALL"]);

            if (parcelNum !== null) {
              const key = String(parcelNum).trim();
              if (key !== "") byParcel.set(key, layer);
            }

            if (owner !== null) {
              const key = String(owner).trim();
              if (key !== "") {
                if (!byOwner.has(key)) byOwner.set(key, []);
                byOwner.get(key).push(layer);
              }
            }
          }
        }).addTo(map);

        // Fit to parcels
        try { map.fitBounds(parcelsLayer.getBounds(), { padding: [20, 20] }); } catch(e) {}

        // Fill autocomplete lists
        acParcel.list = Array.from(byParcel.keys()).sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
        acOwner.list  = Array.from(byOwner.keys()).sort();

      })
      .catch(err => {
        console.error(err);
        alert("Failed to load: " + parcelsUrl + "\n\n" + err.message);
      });

    // ===== Search behavior =====
    function selectParcel(value) {
      const key = String(value || "").trim();
      const layer = byParcel.get(key);
      if (layer) zoomToLayer(layer);
      else alert("Parcel not found: " + key);
    }

    function selectOwner(value) {
      const key = String(value || "").trim();
      const layers = byOwner.get(key);
      if (!layers || layers.length === 0) {
        alert("Owner not found: " + key);
        return;
      }

      // If owner has multiple parcels, zoom to all
      if (layers.length === 1) {
        zoomToLayer(layers[0]);
      } else {
        const group = L.featureGroup(layers);
        map.fitBounds(group.getBounds(), { padding: [30, 30], maxZoom: 20 });
        // open first popup
        layers[0].openPopup();
      }
    }

    // Awesomplete selection events
    qParcel.addEventListener("awesomplete-selectcomplete", (e) => {
      selectParcel(e.text.value);
    });
    qOwner.addEventListener("awesomplete-selectcomplete", (e) => {
      selectOwner(e.text.value);
    });

    // Enter key: also run search
    qParcel.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); selectParcel(qParcel.value); }
    });
    qOwner.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); selectOwner(qOwner.value); }
    });

    // Buttons
    document.getElementById("btnHome").addEventListener("click", () => {
      map.setView([startLat, startLng], startZoom);
    });
    document.getElementById("btnClear").addEventListener("click", () => {
      qParcel.value = "";
      qOwner.value = "";
      qParcel.focus();
    });
  </script>
</body>
</html>
