<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EJBEH CADASTRE MAP</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Awesomplete (lightweight autocomplete) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    /* === Cemetery-like branding blocks === */
    .topPanel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
      max-width: 380px;
    }
    .topPanel h1 {
      font-size: 16px;
      margin: 0 0 6px 0;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .topPanel .sub {
      font-size: 12px;
      opacity: 0.75;
      margin: 0 0 10px 0;
    }

    /* Search row like cemetery ("Search" + "Clear") */
    .searchRow {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .btn {
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.15);
      background: white;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      user-select: none;
    }
    .btn:hover { background: #f2f4f6; }

    .inputs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .inpWrap label {
      display: block;
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .inp {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.18);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      background: rgba(255,255,255,0.96);
    }

    /* Compact mode (when zoom in) */
    .topPanel.compact {
      max-width: 260px;
      padding: 8px 10px;
    }
    .topPanel.compact h1 { font-size: 14px; margin-bottom: 4px; }
    .topPanel.compact .sub { display: none; }
    .topPanel.compact .inp { padding: 6px 8px; font-size: 12px; }
    .topPanel.compact .btn { padding: 5px 8px; font-size: 11px; }

    /* Optional collapse button */
    .collapseRow {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    /* Bottom-left cemetery-like contact card */
    .footerCard {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
      font-size: 12px;
      max-width: 360px;
    }
    .logos {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .logos img {
      height: 28px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    .powered {
      font-size: 11px;
      opacity: 0.75;
      margin: 0 0 6px 0;
    }
    .name {
      font-weight: 800;
      margin: 0;
      font-size: 13px;
    }
    .role {
      margin: 2px 0 0 0;
      opacity: 0.8;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .contactLine { margin: 6px 0 0 0; }
    .socials {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .socials a { color: #0b5fff; text-decoration: none; }
    .socials a:hover { text-decoration: underline; }

    /* Popup */
    .popup-title { font-weight: 800; margin-bottom: 6px; }
    .kv { display: grid; grid-template-columns: 95px 1fr; gap: 6px 10px; }
    .k { opacity: 0.7; }
    .v { word-break: break-word; }
  </style>
</head>

<body>
  <!-- Top-left panel (branding + search like cemetery) -->
  <div class="topPanel" id="topPanel">
    <h1>EJBEH CADASTRE MAP</h1>
    <p class="sub">Parcels: EJBEH_PARCELS • Skygridlb</p>

    <div class="searchRow">
      <button class="btn" id="btnSearch">Search</button>
      <button class="btn" id="btnClear">Clear</button>
      <button class="btn" id="btnHome">Home</button>
    </div>

    <div class="inputs" id="inputs">
      <div class="inpWrap">
        <label for="qParcel">Parcel Number</label>
        <input id="qParcel" class="inp" placeholder="e.g. 530" autocomplete="off" />
      </div>

      <div class="inpWrap">
        <label for="qOwner">Owner (Arabic)</label>
        <input id="qOwner" class="inp" placeholder="اكتب اسم المالك..." autocomplete="off" />
      </div>
    </div>

    <div class="collapseRow">
      <button class="btn" id="btnToggle">Hide</button>
    </div>
  </div>

  <div id="map"></div>

  <!-- Bottom-left contact card (cemetery-like) -->
  <div class="footerCard">
    <p class="powered">Powered by</p>

    <div class="logos">
      <!-- Put these in your repo -->
      <img src="logo/maronite.png" alt="Maronite" onerror="this.style.display='none';" />
      <img src="logo/skygridlb.png" alt="Skygridlb" onerror="this.style.display='none';" />
    </div>

    <p class="name">FADI BOULOS KASS HANNA</p>
    <p class="role">OWNER | GENERAL MANAGER</p>
    <p class="role">GEOSPATIAL ENGINEER</p>

    <p class="contactLine">+961 71 709 417</p>
    <p class="contactLine">fadi@skygridlb.com</p>

    <div class="socials">
      <a href="https://www.facebook.com/" target="_blank" rel="noopener">Facebook</a>
      <a href="https://www.instagram.com/" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.linkedin.com/company/skygridlb/" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </div>

  <script>
    // Start location you gave
    const startLat = 34.308659;
    const startLng = 35.941757;
    const startZoom = 18;

    // Map (allow more zoom; Esri imagery generally supports up to ~21/22)
    const map = L.map('map', {
      zoomControl: true,
      preferCanvas: true,
      maxZoom: 22
    }).setView([startLat, startLng], startZoom);

    // Satellite (works on GitHub Pages)
    const esriImagery = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 22, attribution: 'Imagery © Esri' }
    ).addTo(map);

    const esriLabels = L.tileLayer(
      'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 22, attribution: 'Labels © Esri' }
    ).addTo(map);

    // Parcels styling
    function parcelStyle(feature) {
      return { color: '#ff3b30', weight: 2, fillColor: '#ff3b30', fillOpacity: 0.08 };
    }

    function getAny(props, keys) {
      for (const k of keys) {
        if (props && props[k] !== undefined && props[k] !== null) {
          const s = String(props[k]).trim();
          if (s !== "" && s.toLowerCase() !== "none" && s.toLowerCase() !== "null") return props[k];
        }
      }
      return null;
    }

    // Your GeoJSON path (YOU SAID it's inside /data)
    const parcelsUrl = "data/EJBEH_PARCELS.geojson";

    let parcelsLayer = null;

    // For autocomplete
    let parcelNums = [];
    let owners = [];

    // Build lookup arrays
    function uniqueSorted(arr) {
      const s = new Set(arr.filter(v => v !== null && v !== undefined && String(v).trim() !== ""));
      return Array.from(s).sort((a,b) => String(a).localeCompare(String(b), 'ar'));
    }

    function zoomToLayer(layer) {
      try {
        map.fitBounds(layer.getBounds(), { padding: [30, 30] });
        layer.openPopup();
      } catch(e) {}
    }

    fetch(parcelsUrl)
      .then(r => {
        if (!r.ok) throw new Error("Could not load " + parcelsUrl);
        return r.json();
      })
      .then(geojson => {

        parcelsLayer = L.geoJSON(geojson, {
          style: parcelStyle,
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};

            // Fields for popup (ONLY these)
            const owner = getAny(p, ["Owner", "OWNER", "Owners", "OWNERS", "Owners_All", "OWNERS_ALL"]);
            const createdBy = getAny(p, ["CreatedBY", "CREATEDBY", "CreatedBy", "CREATED_BY"]);
            const area = getAny(p, ["Area", "AREA", "Shape_Area", "SHAPE_AREA"]);
            const mahalla = getAny(p, ["AL_MAHALLA", "Mahalla", "MAHALLA"]);

            // Parcel number for searching (not necessarily shown)
            const parcNum = getAny(p, ["Parc_Num", "PARC_NUM", "Parcel_Num", "PARCEL_NUM"]);

            if (parcNum !== null) parcelNums.push(String(parcNum).trim());
            if (owner !== null) owners.push(String(owner).trim());

            const html = `
              <div class="popup-title">Parcel${parcNum ? " #" + parcNum : ""}</div>
              <div class="kv">
                ${owner ? `<div class="k">Owner</div><div class="v">${owner}</div>` : ""}
                ${createdBy ? `<div class="k">PreparedBy</div><div class="v">${createdBy}</div>` : ""}
                ${mahalla ? `<div class="k">Al Mahalla</div><div class="v">${mahalla}</div>` : ""}
                ${area ? `<div class="k">Area</div><div class="v">${area}</div>` : ""}
              </div>
            `;
            layer.bindPopup(html, { maxWidth: 520 });

            layer.on('mouseover', () => layer.setStyle({ weight: 3, fillOpacity: 0.15 }));
            layer.on('mouseout', () => layer.setStyle(parcelStyle(feature)));
          }
        }).addTo(map);

        // Fit to parcels
        try { map.fitBounds(parcelsLayer.getBounds(), { padding: [20, 20] }); } catch(e) {}

        // Setup autocomplete
        parcelNums = uniqueSorted(parcelNums);
        owners = uniqueSorted(owners);

        new Awesomplete(document.getElementById("qParcel"), {
          list: parcelNums,
          minChars: 1,
          maxItems: 12,
          autoFirst: true
        });

        new Awesomplete(document.getElementById("qOwner"), {
          list: owners,
          minChars: 1,
          maxItems: 12,
          autoFirst: true,
          filter: function(text, input) {
            // Arabic-friendly contains
            return text.indexOf(input) !== -1;
          }
        });

      })
      .catch(err => {
        console.error(err);
        alert(
          "GeoJSON not found.\n\n" +
          "Make sure you uploaded:\n" +
          "data/EJBEH_PARCELS.geojson\n\n" +
          "Error: " + err.message
        );
      });

    // ===== Search actions =====
    function searchParcel() {
      const q = (document.getElementById("qParcel").value || "").trim();
      if (!q || !parcelsLayer) return;

      let found = null;
      parcelsLayer.eachLayer(l => {
        const p = (l.feature && l.feature.properties) ? l.feature.properties : {};
        const pn = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM"]);
        if (pn !== null && String(pn).trim() === q) found = l;
      });

      if (found) zoomToLayer(found);
      else alert("Parcel not found: " + q);
    }

    function searchOwner() {
      const q = (document.getElementById("qOwner").value || "").trim();
      if (!q || !parcelsLayer) return;

      const matches = [];
      parcelsLayer.eachLayer(l => {
        const p = (l.feature && l.feature.properties) ? l.feature.properties : {};
        const ow = getAny(p, ["Owner","OWNER","Owners","OWNERS","Owners_All","OWNERS_ALL"]);
        if (ow !== null) {
          const s = String(ow).trim();
          // exact or contains
          if (s === q || s.indexOf(q) !== -1) matches.push(l);
        }
      });

      if (matches.length === 0) {
        alert("Owner not found: " + q);
        return;
      }

      // Zoom to first match (simple + fast)
      zoomToLayer(matches[0]);

      // If you want: zoom to ALL matches bounds, tell me and I’ll modify.
      // (Because owners can repeat across many parcels.)
    }

    document.getElementById("btnSearch").addEventListener("click", () => {
      // Priority: parcel if filled, else owner
      const qP = (document.getElementById("qParcel").value || "").trim();
      const qO = (document.getElementById("qOwner").value || "").trim();
      if (qP) searchParcel();
      else if (qO) searchOwner();
      else alert("Type Parcel Number or Owner name.");
    });

    document.getElementById("btnClear").addEventListener("click", () => {
      document.getElementById("qParcel").value = "";
      document.getElementById("qOwner").value = "";
    });

    document.getElementById("btnHome").addEventListener("click", () => {
      map.setView([startLat, startLng], startZoom);
    });

    // Enter key triggers search
    document.getElementById("qParcel").addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchParcel();
    });
    document.getElementById("qOwner").addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchOwner();
    });

    // Autocomplete selection triggers zoom
    document.getElementById("qParcel").addEventListener("awesomplete-selectcomplete", () => searchParcel());
    document.getElementById("qOwner").addEventListener("awesomplete-selectcomplete", () => searchOwner());

    // ===== Make panel smaller when zooming in =====
    const topPanel = document.getElementById("topPanel");
    map.on("zoomend", () => {
      const z = map.getZoom();
      if (z >= 19) topPanel.classList.add("compact");
      else topPanel.classList.remove("compact");
    });

    // Optional hide/show (so imagery is always visible)
    const inputs = document.getElementById("inputs");
    const btnToggle = document.getElementById("btnToggle");
    let isHidden = false;
    btnToggle.addEventListener("click", () => {
      isHidden = !isHidden;
      inputs.style.display = isHidden ? "none" : "grid";
      btnToggle.textContent = isHidden ? "Show" : "Hide";
    });
  </script>
</body>
</html>
