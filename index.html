<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>EJBEH CADASTRE MAP</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; background:#000; }

    /* Top-left panel (title + searches) */
    .panel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 9999;
      width: 360px;
      max-width: calc(100vw - 28px);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    .panelHeader{
      padding: 10px 12px 8px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .panelTitle{ margin:0; font-size:16px; font-weight:700; }
    .panelSub{ margin:4px 0 0 0; font-size:12px; opacity:0.75; }

    .panelBody{ padding: 10px 12px 12px 12px; }
    .lbl{ font-size:12px; opacity:0.75; margin: 8px 0 6px; }
    .inp{
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      background: rgba(255,255,255,0.98);
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
      flex-wrap: wrap;
    }
    .btn{
      cursor:pointer;
      border: 1px solid rgba(0,0,0,0.14);
      background: #fff;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
    }
    .btn:hover{ background:#f3f5f7; }

    .tip{
      margin-top:10px;
      font-size:12px;
      opacity:0.7;
      line-height: 1.35;
    }

    /* Make panel smaller on mobile */
    @media (max-width: 480px){
      .panel{ width: calc(100vw - 20px); left:10px; top:10px; border-radius: 16px; }
      .panelHeader{ padding: 9px 10px 7px 10px; }
      .panelBody{ padding: 8px 10px 10px 10px; }
      .inp{ font-size: 13px; padding: 9px 10px; }
    }

    /* Compact mode (when zoomed in) so it doesn't block imagery */
    .panel.compact .panelSub,
    .panel.compact .tip,
    .panel.compact .lbl:first-of-type{
      display:none;
    }
    .panel.compact .panelBody{
      padding-top: 8px;
    }
    .panel.compact{
      width: 280px;
    }
    @media (max-width: 480px){
      .panel.compact{ width: 240px; }
    }

    /* Bottom-left contact card (cemetery-like) */
    .contactCard{
      position:absolute;
      left: 14px;
      bottom: 14px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      padding: 10px 12px;
      font-family: Arial, sans-serif;
      display:flex;
      gap: 12px;
      align-items:center;
      max-width: calc(100vw - 28px);
    }
    .ccLogo{
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex: 0 0 auto;
    }
    .ccLogo img{ width:100%; height:100%; object-fit: contain; padding: 6px; }
    .ccText{ line-height: 1.2; }
    .ccName{ font-size: 13px; font-weight: 700; margin:0; }
    .ccRole{ font-size: 11px; opacity: 0.75; margin: 2px 0 0 0; }
    .ccLinks{
      margin-top: 6px;
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items:center;
      font-size: 12px;
    }
    .ccLinks a{
      color:#0b5fff;
      text-decoration:none;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
    }
    .ccLinks a:hover{ background:#f3f5f7; }
    .ccMini{
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.85;
    }
    .ccMini a{
      color:#0b5fff;
      text-decoration:none;
    }
    .ccMini a:hover{ text-decoration: underline; }

    @media (max-width: 480px){
      .contactCard{ left:10px; bottom:10px; padding: 10px 10px; border-radius: 18px; }
      .ccLogo{ width: 48px; height: 48px; }
    }

    /* Popup styling */
    .popup-title { font-weight:700; margin-bottom: 6px; }
    .kv { display:grid; grid-template-columns: 95px 1fr; gap: 6px 10px; }
    .k { opacity:0.75; }
    .v { word-break: break-word; white-space: pre-wrap; }

  </style>
</head>

<body>
  <!-- Top-left panel -->
  <div class="panel" id="panel">
    <div class="panelHeader">
      <p class="panelTitle">EJBEH CADASTRE MAP</p>
      <p class="panelSub">Parcels: EJBEH_PARCELS • Skygridlb</p>
    </div>
    <div class="panelBody">
      <div class="lbl">Search by Parcel Number</div>
      <input id="parcelInput" class="inp" inputmode="numeric" placeholder="e.g. 530" list="parcelNums" />
      <datalist id="parcelNums"></datalist>

      <div class="lbl">Search by Owner</div>
      <input id="ownerInput" class="inp" dir="rtl" placeholder="اكتب اسم المالك..." list="ownerNames" />
      <datalist id="ownerNames"></datalist>

      <div class="row">
        <button class="btn" id="btnClear">Clear</button>
      </div>

      <div class="tip">Tip: choose from the dropdown. Parcel search zooms and opens popup.</div>
    </div>
  </div>

  <div id="map"></div>

  <!-- Bottom-left contact card -->
  <div class="contactCard">
    <div class="ccLogo" title="Skygridlb">
      <!-- Will try both root and /logo/ -->
      <img id="skyLogo" src="skygridlb.png" alt="Skygridlb"
           onerror="this.onerror=null; this.src='logo/skygridlb.png';" />
    </div>

    <div class="ccText">
      <p class="ccName">FADI BOULOS KASS HANNA</p>
      <p class="ccRole">OWNER | GENERAL MANAGER<br/>GEO SPATIAL ENGINEER</p>

      <div class="ccMini">
        <a href="tel:+96171709417">+961 71 709 417</a>
        <a href="mailto:fadi@skygridlb.com">fadi@skygridlb.com</a>
        <span>© <span id="y"></span></span>
      </div>

      <div class="ccLinks">
        <a href="https://www.facebook.com/skygridlb" target="_blank" rel="noopener">Facebook</a>
        <a href="https://www.instagram.com/skygridlb/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.linkedin.com/company/skygridlb" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    // Start location
    const startLat = 34.308659;
    const startLng = 35.941757;
    const startZoom = 18;

    const map = L.map('map', { zoomControl: true, preferCanvas: true })
      .setView([startLat, startLng], startZoom);

    // Allow more zoom (will over-zoom imagery if provider stops earlier, but user wanted more zoom)
    map.setMaxZoom(23);

    // Satellite (Esri World Imagery) + labels
    const imagery = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 23, attribution: 'Imagery © Esri' }
    ).addTo(map);

    const labels = L.tileLayer(
      'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 23, attribution: 'Labels © Esri' }
    ).addTo(map);

    L.control.layers(
      { "Satellite": imagery },
      { "Labels": labels },
      { collapsed: true }
    ).addTo(map);

    // Compact panel when zoomed in (so it doesn't block image)
    const panel = document.getElementById("panel");
    function updatePanelSize(){
      const z = map.getZoom();
      if (z >= 19) panel.classList.add("compact");
      else panel.classList.remove("compact");
    }
    map.on("zoomend", updatePanelSize);
    updatePanelSize();

    // Styling for parcels
    function parcelStyle(){
      return { color:'#ff2d2d', weight: 2, fillColor:'#ff2d2d', fillOpacity: 0.06 };
    }

    // Get first non-empty value from possible keys
    function getAny(props, keys){
      for (const k of keys){
        if (!props) continue;
        const v = props[k];
        if (v === undefined || v === null) continue;
        const s = String(v).trim();
        if (s !== "" && s.toLowerCase() !== "none" && s.toLowerCase() !== "null") return v;
      }
      return null;
    }

    // Try multiple URLs for GeoJSON (root OR data folder)
    const geojsonCandidates = [
      "data/EJBEH_PARCELS.geojson",
      "EJBEH_PARCELS.geojson",
      "data/EJBEH_PARCELS_RES.geojson",
      "EJBEH_PARCELS_RES.geojson"
    ];

    async function fetchFirst(urls){
      let lastErr = null;
      for (const u of urls){
        try{
          const r = await fetch(u, { cache: "no-store" });
          if (!r.ok) throw new Error(r.status + " " + r.statusText);
          return await r.json();
        }catch(e){
          lastErr = { url:u, err:e };
        }
      }
      throw lastErr;
    }

    let parcelsLayer = null;
    let parcelIndex = new Map();   // parcelNum -> layer
    let ownerIndex = new Map();    // ownerName -> array of layers (some owners repeat)

    const parcelInput = document.getElementById("parcelInput");
    const ownerInput  = document.getElementById("ownerInput");
    const parcelNumsDatalist = document.getElementById("parcelNums");
    const ownerNamesDatalist = document.getElementById("ownerNames");

    function addOption(datalist, value){
      const opt = document.createElement("option");
      opt.value = value;
      datalist.appendChild(opt);
    }

    function buildIndexes(){
      parcelIndex.clear();
      ownerIndex.clear();
      parcelNumsDatalist.innerHTML = "";
      ownerNamesDatalist.innerHTML = "";

      const parcelNumsSet = new Set();
      const ownerSet = new Set();

      parcelsLayer.eachLayer(l => {
        const p = (l.feature && l.feature.properties) ? l.feature.properties : {};

        const parcelNum = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","PARCELNO","ParcelNo"]);
        const owner = getAny(p, ["Owner","OWNER","Owners","OWNERS","Owners_All","OWNERS_ALL"]);
        const pn = parcelNum !== null ? String(parcelNum).trim() : "";

        if (pn){
          // Keep first match for exact parcel number
          if (!parcelIndex.has(pn)) parcelIndex.set(pn, l);
          parcelNumsSet.add(pn);
        }

        if (owner !== null){
          const o = String(owner).trim();
          if (o){
            ownerSet.add(o);
            if (!ownerIndex.has(o)) ownerIndex.set(o, []);
            ownerIndex.get(o).push(l);
          }
        }
      });

      // Fill datalists (sorted)
      Array.from(parcelNumsSet).sort((a,b)=> {
        const na = Number(a), nb = Number(b);
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return a.localeCompare(b);
      }).forEach(v => addOption(parcelNumsDatalist, v));

      // Arabic sort is tricky; keep simple locale compare
      Array.from(ownerSet).sort((a,b)=> a.localeCompare(b)).forEach(v => addOption(ownerNamesDatalist, v));
    }

    function openLayer(l){
      if (!l) return;
      try{
        map.fitBounds(l.getBounds(), { padding:[30,30], maxZoom: 22 });
      }catch(e){
        // fallback
      }
      l.openPopup();
      l.setStyle({ weight: 3, fillOpacity: 0.12 });
      setTimeout(()=> {
        try { l.setStyle(parcelStyle()); } catch(e){}
      }, 900);
    }

    function searchParcel(){
      const q = (parcelInput.value || "").trim();
      if (!q || !parcelsLayer) return;

      const l = parcelIndex.get(q);
      if (l) { openLayer(l); return; }

      // Try numeric equivalence (e.g., "0530" vs "530")
      const qn = String(Number(q));
      if (qn !== "NaN" && parcelIndex.has(qn)) { openLayer(parcelIndex.get(qn)); return; }

      alert("Parcel not found: " + q);
    }

    function searchOwner(){
      const q = (ownerInput.value || "").trim();
      if (!q || !parcelsLayer) return;

      // 1) exact dropdown value
      if (ownerIndex.has(q)){
        openLayer(ownerIndex.get(q)[0]);
        return;
      }

      // 2) contains (Arabic partial typing) - first match
      let found = null;
      ownerIndex.forEach((layers, name) => {
        if (!found && name.includes(q)) found = layers[0];
      });

      if (found) { openLayer(found); return; }
      alert("Owner not found: " + q);
    }

    // Clear button
    document.getElementById("btnClear").addEventListener("click", () => {
      parcelInput.value = "";
      ownerInput.value = "";
      if (parcelsLayer) {
        try { map.setView([startLat, startLng], startZoom); } catch(e){}
      }
    });

    // Enter triggers search
    parcelInput.addEventListener("keydown", (e)=>{ if (e.key === "Enter") searchParcel(); });
    ownerInput.addEventListener("keydown",  (e)=>{ if (e.key === "Enter") searchOwner(); });

    // Choosing from datalist triggers search (works in most browsers)
    parcelInput.addEventListener("change", searchParcel);
    ownerInput.addEventListener("change", searchOwner);

    // Load GeoJSON
    (async function init(){
      try{
        const geojson = await fetchFirst(geojsonCandidates);

        parcelsLayer = L.geoJSON(geojson, {
          style: parcelStyle,
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};

            const owner = getAny(p, ["Owner","OWNER","Owners","OWNERS","Owners_All","OWNERS_ALL"]);
            const preparedBy = getAny(p, ["PreparedBy","PREPAREDBY","CreatedBY","CREATEDBY","CreatedBy","CREATED_BY"]);
            const area = getAny(p, ["Area","AREA","Shape_Area","SHAPE_AREA"]);
            const mahalla = getAny(p, ["AL_MAHALLA","Mahalla","MAHALLA","ALMAHALLA"]);
            const parcelNum = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","PARCELNO","ParcelNo"]);

        const html = `
  <div class="popup-title">Parcel${parcelNum ? " #" + parcelNum : ""}</div>
  <div class="kv">
    ${owner ? `<div class="k">Owner</div><div class="v" dir="rtl">${owner}</div>` : ``}
    ${preparedBy ? `<div class="k">Prepared</div><div class="v">${preparedBy}</div>` : ``}
    ${mahalla ? `<div class="k">Mahalla</div><div class="v" dir="rtl">${mahalla}</div>` : ``}
    ${area ? `<div class="k">Area</div><div class="v">${area} m²</div>` : ``}
  </div>
`;
            layer.bindPopup(html, { maxWidth: 460 });

            layer.on("mouseover", ()=> layer.setStyle({ weight: 3, fillOpacity: 0.12 }));
            layer.on("mouseout",  ()=> layer.setStyle(parcelStyle()));
          }
        }).addTo(map);

        // Index for searches + autocomplete
        buildIndexes();

        // Fit to parcels
        try { map.fitBounds(parcelsLayer.getBounds(), { padding:[20,20] }); } catch(e){}

      }catch(e){
        console.error(e);
        const msg = (e && e.url)
          ? `GeoJSON not found.\nTried:\n- ${geojsonCandidates.join("\n- ")}\n\nLast error (${e.url}): ${e.err}`
          : `GeoJSON not found.\nTried:\n- ${geojsonCandidates.join("\n- ")}`;
        alert(msg);
      }
    })();
  </script>
</body>
</html>
