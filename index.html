<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EJBEH CADASTRE MAP</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    /* ===== Branding panel (mobile-first) ===== */
    .panel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
      font-family: Arial, sans-serif;
      width: min(380px, calc(100vw - 28px));
    }

    .panel.compact {
      width: min(240px, calc(100vw - 28px));
      padding: 8px 10px;
    }

    .panel .head {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .panel .logo {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .panel .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 4px;
      display: block;
    }

    .panel .title { font-size: 16px; font-weight: 800; margin: 0; line-height: 1.1; }
    .panel .sub { font-size: 12px; opacity: 0.75; margin: 2px 0 0 0; }

    .panel.compact .title { font-size: 14px; }
    .panel.compact .sub { font-size: 11px; }
    .panel.compact .logo { width: 34px; height: 34px; }

    .panel .section-title {
      font-size: 12px;
      font-weight: 700;
      margin: 10px 0 6px 0;
      opacity: 0.85;
    }

    .panel.compact .section-title { margin-top: 8px; }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      background: white;
    }

    .panel.compact .input {
      padding: 8px 10px;
      font-size: 13px;
    }

    .btn {
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.12);
      background: white;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 13px;
      white-space: nowrap;
    }
    .btn:hover { background: #f3f5f7; }

    .tip {
      font-size: 11px;
      margin-top: 8px;
      opacity: 0.75;
    }

    /* Footer (like cemetery style, clickable phone/email) */
    .footer {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
      font-family: Arial, sans-serif;
      font-size: 12px;
      width: min(520px, calc(100vw - 28px));
    }

    .footer .line1 { font-weight: 800; margin-bottom: 2px; }
    .footer .line2 { opacity: 0.85; margin-bottom: 6px; }

    .footer a {
      color: #0b5fff;
      text-decoration: none;
      margin-right: 10px;
      display: inline-block;
    }
    .footer a:hover { text-decoration: underline; }

    .footer .chips a{
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 999px;
      padding: 6px 10px;
      color: #111;
      background: #fff;
      text-decoration: none;
      margin-right: 8px;
    }
    .footer .chips a:hover { background: #f3f5f7; }

    /* Make panel not block map too much on small screens */
    @media (max-width: 480px) {
      .panel { top: 10px; left: 10px; width: calc(100vw - 20px); }
      .footer { left: 10px; bottom: 10px; width: calc(100vw - 20px); }
    }
  </style>
</head>

<body>
  <!-- Branding + Search -->
  <div class="panel" id="panel">
    <div class="head">
      <div class="logo" title="Skygridlb">
        <!-- IMPORTANT: put skygrid-logo-.png next to index.html -->
        <img src="skygrid-logo-.png" alt="Skygridlb" />
      </div>
      <div>
        <p class="title">EJBEH CADASTRE MAP</p>
        <p class="sub">Parcels: EJBEH_PARCELS • Skygridlb</p>
      </div>
    </div>

    <div class="section-title">Search by Parcel Number</div>
    <div class="row">
      <input class="input" id="parcelSearch" type="text" inputmode="numeric" placeholder="e.g. 530" />
      <button class="btn" id="btnParcelGo">Go</button>
    </div>

    <div class="section-title">Search by Owner</div>
    <div class="row">
      <input class="input" id="ownerSearch" type="text" placeholder="اكتب اسم المالك..." list="ownerList" />
      <datalist id="ownerList"></datalist>
      <button class="btn" id="btnOwnerGo">Go</button>
    </div>

    <div class="row" style="margin-top:8px;">
      <button class="btn" id="btnClear">Clear</button>
    </div>

    <div class="tip">Tip: choose from dropdown. Search zooms and opens popup.</div>
  </div>

  <div id="map"></div>

  <!-- Footer contact (clickable phone/email + social) -->
  <div class="footer">
    <div class="line1">Skygridlb — Eng. Fadi Kasshanna</div>
    <div class="line2">
      <a href="tel:+96171709417">+961 71 709 417</a>
      <a href="mailto:fadi@skygridlb.com">fadi@skygridlb.com</a>
      <span>© <span id="y"></span></span>
    </div>
    <div class="chips">
      <a href="https://www.facebook.com/skygridlb" target="_blank" rel="noopener">Facebook</a>
      <a href="https://www.linkedin.com/company/skygridlb" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.instagram.com/skygridlb/" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    // Start location
    const startLat = 34.308659;
    const startLng = 35.941757;
    const startZoom = 18;

    // Map (allow more zoom)
    const map = L.map('map', {
      zoomControl: true,
      preferCanvas: true,
      maxZoom: 22 // try 22 (Esri usually supports up to 21/22)
    }).setView([startLat, startLng], startZoom);

    // Satellite (Esri World Imagery)
    const imagery = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 22, attribution: 'Imagery © Esri' }
    ).addTo(map);

    // Labels overlay
    const labels = L.tileLayer(
      'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 22, attribution: 'Labels © Esri' }
    ).addTo(map);

    // Parcels style
    function parcelStyle() {
      return {
        color: '#ff2d2d',
        weight: 2,
        fillColor: '#ff2d2d',
        fillOpacity: 0.06
      };
    }

    function getAny(p, keys) {
      for (const k of keys) {
        const v = p ? p[k] : null;
        if (v !== undefined && v !== null && String(v).trim() !== "" && String(v).trim().toLowerCase() !== "none") {
          return v;
        }
      }
      return null;
    }

    // Update this if your GeoJSON is in /data/
    const parcelsUrl = "data/EJBEH_PARCELS.geojson";

    let parcelsLayer = null;
    let indexByParcel = new Map(); // parcelNum -> layer
    let indexByOwner = new Map();  // ownerText -> [layers]
    let ownerNames = new Set();

    function normalize(s){
      return String(s || "").trim();
    }

    function buildIndexes(layer) {
      indexByParcel.clear();
      indexByOwner.clear();
      ownerNames.clear();

      layer.eachLayer(l => {
        const p = (l.feature && l.feature.properties) ? l.feature.properties : {};

        const parcelNum = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","ParcelNo","PARCELNO","PARCEL"]);
        const owner = getAny(p, ["Owner","OWNER","Owners","OWNERS","Owners_All","OWNERS_ALL"]);
        const ownerStr = normalize(owner);

        if (parcelNum !== null) {
          indexByParcel.set(normalize(parcelNum), l);
        }

        // owner could contain multiple owners separated by "/"
        if (ownerStr) {
          ownerNames.add(ownerStr);

          const key = ownerStr;
          if (!indexByOwner.has(key)) indexByOwner.set(key, []);
          indexByOwner.get(key).push(l);
        }
      });

      // Fill datalist for autocomplete
      const dl = document.getElementById("ownerList");
      dl.innerHTML = "";
      [...ownerNames].sort().slice(0, 5000).forEach(name => { // safety cap
        const opt = document.createElement("option");
        opt.value = name;
        dl.appendChild(opt);
      });
    }

    function focusLayer(l) {
      map.fitBounds(l.getBounds(), { padding: [30, 30], maxZoom: 21 });
      l.openPopup();
      l.setStyle({ weight: 3, fillOpacity: 0.12 });
      setTimeout(() => l.setStyle(parcelStyle()), 800);
    }

    fetch(parcelsUrl)
      .then(r => {
        if (!r.ok) throw new Error("Could not load " + parcelsUrl);
        return r.json();
      })
      .then(geojson => {
        parcelsLayer = L.geoJSON(geojson, {
          style: parcelStyle,
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};

            // Only show: owner, preparedby, area, al_mahalla
            const owner = getAny(p, ["Owner","OWNER","Owners_All","OWNERS_ALL","Owners","OWNERS"]);
            const prepared = getAny(p, ["PreparedBy","PREPAREDBY","CreatedBY","CREATEDBY","CreatedBy","CREATED_BY"]);
            const area = getAny(p, ["Area","AREA","Shape_Area","SHAPE_AREA"]);
            const mahalla = getAny(p, ["AL_MAHALLA","Mahalla","MAHALLA"]);

            const parcelNum = getAny(p, ["Parc_Num","PARC_NUM","Parcel_Num","PARCEL_NUM","ParcelNo","PARCELNO","PARCEL"]);

            const rows = [];
            if (owner) rows.push(`<div class="k">Owner</div><div class="v">${owner}</div>`);
            if (prepared) rows.push(`<div class="k">Prepared</div><div class="v">${prepared}</div>`);
            if (area) rows.push(`<div class="k">Area</div><div class="v">${area}</div>`);
            if (mahalla) rows.push(`<div class="k">Mahalla</div><div class="v">${mahalla}</div>`);

            const html = `
              <div style="font-weight:800;margin-bottom:6px;">Parcel${parcelNum ? " #" + parcelNum : ""}</div>
              <div style="display:grid;grid-template-columns:90px 1fr;gap:6px 10px;">
                ${rows.join("")}
              </div>
            `;

            layer.bindPopup(html, { maxWidth: 420 });

            layer.on('mouseover', () => layer.setStyle({ weight: 3, fillOpacity: 0.12 }));
            layer.on('mouseout', () => layer.setStyle(parcelStyle()));
          }
        }).addTo(map);

        // Fit bounds once
        try { map.fitBounds(parcelsLayer.getBounds(), { padding: [20,20] }); } catch(e) {}

        // Build search indexes + autocomplete
        buildIndexes(parcelsLayer);
      })
      .catch(err => {
        console.error(err);
        alert("GeoJSON not found.\nPut EJBEH_PARCELS.geojson inside /data/ next to your HTML.\n\nError: " + err.message);
      });

    // Search actions
    function doParcelSearch() {
      if (!parcelsLayer) return;
      const q = normalize(document.getElementById("parcelSearch").value);
      if (!q) return;

      const layer = indexByParcel.get(q);
      if (layer) {
        focusLayer(layer);
      } else {
        alert("Parcel not found: " + q);
      }
    }

    function doOwnerSearch() {
      if (!parcelsLayer) return;
      const q = normalize(document.getElementById("ownerSearch").value);
      if (!q) return;

      const layers = indexByOwner.get(q);
      if (layers && layers.length) {
        // If multiple parcels share same owner, zoom to bounds of all
        const group = L.featureGroup(layers);
        map.fitBounds(group.getBounds(), { padding: [30,30], maxZoom: 20 });

        // Open first popup (you can change this to nearest)
        layers[0].openPopup();
      } else {
        alert("Owner not found: " + q);
      }
    }

    document.getElementById("btnParcelGo").addEventListener("click", doParcelSearch);
    document.getElementById("btnOwnerGo").addEventListener("click", doOwnerSearch);

    document.getElementById("parcelSearch").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doParcelSearch();
    });
    document.getElementById("ownerSearch").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doOwnerSearch();
    });

    // Clear
    document.getElementById("btnClear").addEventListener("click", () => {
      document.getElementById("parcelSearch").value = "";
      document.getElementById("ownerSearch").value = "";
      map.setView([startLat, startLng], startZoom);
      if (parcelsLayer) parcelsLayer.eachLayer(l => l.setStyle(parcelStyle()));
    });

    // Auto-compact panel when zoomed in (so it doesn't cover imagery)
    const panel = document.getElementById("panel");
    function updatePanelSize() {
      const z = map.getZoom();
      if (z >= 20) panel.classList.add("compact");
      else panel.classList.remove("compact");
    }
    map.on("zoomend", updatePanelSize);
    updatePanelSize();
  </script>
</body>
</html>
